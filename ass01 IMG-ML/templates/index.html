<!DOCTYPE html>
<html>
<head>
    <title>Brain Tumor Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f2f2f2;
            margin-top: 50px;
        }
        .box {
            width: 450px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        input, button {
            margin-top: 10px;
            padding: 10px;
        }
        h3 {
            color: green;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Brain Tumor MRI Prediction</h2>

        <form action="/predict" method="post" enctype="multipart/form-data">
            <input type="file" name="image" required><br>
            <button type="submit">Predict</button>
        </form>

        <h3>{{ result }}</h3>
    </div>
</body>
</html>
